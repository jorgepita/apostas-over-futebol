name: Bot Apostas

on:
  schedule:
    - cron: '0 7 * * *'    # 07:00 UTC — settlement
    - cron: '0 17 * * *'   # 17:00 UTC — main generation
    - cron: '30 22 * * *'  # 22:30 UTC — settlement
    - cron: '0 23 * * *'   # 23:00 UTC — top-up (ligas não-EU)
  workflow_dispatch:
    inputs:
      job:
        description: 'Job a executar manualmente'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - settlement
          - topup

permissions:
  contents: write

jobs:
  # ── 07:00 UTC + 22:30 UTC ────────────────────────────────────────────────
  settlement:
    if: >-
      github.event.schedule == '0 7 * * *' ||
      github.event.schedule == '30 22 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'settlement')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Settlement — Actualizar resultados
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python update_results.py

  # ── 17:00 UTC ─────────────────────────────────────────────────────────────
  main-generation:
    if: >-
      github.event.schedule == '0 17 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == '')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Main Generation — Buscar fixtures e gerar picks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python run_main.py

  # ── 23:00 UTC ─────────────────────────────────────────────────────────────
  topup:
    if: >-
      github.event.schedule == '0 23 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'topup')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Top-up — Picks ligas não-EU (odds tardias)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python run_topup.py
